<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" fill="none">
  <!-- Grass stripes (12 bands) -->
  <rect x="0" y="0" width="100" height="12.5" fill="#005d3e"/>
  <rect x="0" y="12.5" width="100" height="12.5" fill="#005138"/>
  <rect x="0" y="25" width="100" height="12.5" fill="#005d3e"/>
  <rect x="0" y="37.5" width="100" height="12.5" fill="#005138"/>
  <rect x="0" y="50" width="100" height="12.5" fill="#005d3e"/>
  <rect x="0" y="62.5" width="100" height="12.5" fill="#005138"/>
  <rect x="0" y="75" width="100" height="12.5" fill="#005d3e"/>
  <rect x="0" y="87.5" width="100" height="12.5" fill="#005138"/>
  <rect x="0" y="100" width="100" height="12.5" fill="#005d3e"/>
  <rect x="0" y="112.5" width="100" height="12.5" fill="#005138"/>
  <rect x="0" y="125" width="100" height="12.5" fill="#005d3e"/>
  <rect x="0" y="137.5" width="100" height="12.5" fill="#005138"/>

  <!-- Subtle vignette -->
  <defs>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="18%" stop-color="#000" stop-opacity="0"/>
      <stop offset="82%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="150" fill="url(#vignette)"/>

  <!-- Field lines -->
  <g stroke="#fff" stroke-opacity="0.18" stroke-width="0.4" fill="none">
    <!-- Outer boundary -->
    <rect x="5" y="5" width="90" height="140"/>

    <!-- Center line -->
    <line x1="5" y1="75" x2="95" y2="75"/>

    <!-- Center circle -->
    <circle cx="50" cy="75" r="12"/>

    <!-- Top penalty area -->
    <rect x="23" y="5" width="54" height="22"/>

    <!-- Top goal area -->
    <rect x="38" y="5" width="24" height="8"/>

    <!-- Top penalty arc (outside penalty area) -->
    <path d="M 40 27 A 12 12 0 0 1 60 27"/>

    <!-- Bottom penalty area -->
    <rect x="23" y="123" width="54" height="22"/>

    <!-- Bottom goal area -->
    <rect x="38" y="137" width="24" height="8"/>

    <!-- Bottom penalty arc (outside penalty area) -->
    <path d="M 40 123 A 12 12 0 0 0 60 123"/>

    <!-- Corner arcs -->
    <path d="M 5 7 A 2 2 0 0 0 7 5"/>
    <path d="M 93 5 A 2 2 0 0 0 95 7"/>
    <path d="M 5 143 A 2 2 0 0 1 7 145"/>
    <path d="M 95 143 A 2 2 0 0 1 93 145"/>
  </g>

  <!-- Center dot -->
  <circle cx="50" cy="75" r="0.8" fill="#fff" fill-opacity="0.25"/>

  <!-- Penalty spots -->
  <circle cx="50" cy="20" r="0.6" fill="#fff" fill-opacity="0.25"/>
  <circle cx="50" cy="130" r="0.6" fill="#fff" fill-opacity="0.25"/>
</svg>
